<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WOOF SMP | Next-Gen Survival</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --bg-dark: #030303;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(0, 242, 255, 0.2);
            --text-main: #e0e0e0;
            --spacing-lg: 100px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* --- BACKGROUND --- */
        .glow-mesh {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #0a001a 0%, #030303 100%);
            z-index: -2;
        }

        /* --- NAV & UPTIME PILL (As requested in image) --- */
        .navbar {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            padding: 20px 8%; display: flex; justify-content: space-between; align-items: center;
            background: rgba(3, 3, 3, 0.8); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .logo { font-family: 'Orbitron'; font-weight: 800; font-size: 1.6rem; color: #fff; text-decoration: none; }
        .logo span { color: var(--primary); text-shadow: 0 0 15px var(--primary); }

        .uptime-pill {
            display: flex; align-items: center; gap: 12px;
            padding: 8px 25px; border-radius: 50px;
            border: 1.5px solid var(--primary);
            background: rgba(0, 242, 255, 0.05);
            box-shadow: inset 0 0 10px rgba(0, 242, 255, 0.1), 0 0 15px rgba(0, 242, 255, 0.1);
        }

        .uptime-pill i { color: var(--primary); font-size: 1.1rem; }
        .uptime-pill span {
            font-family: 'JetBrains Mono', monospace;
            color: var(--primary); font-size: 1.2rem; font-weight: 500;
            letter-spacing: 1px;
        }

        /* --- HERO --- */
        .hero {
            height: 70vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }

        .hero h1 {
            font-family: 'Orbitron'; font-size: clamp(2.5rem, 8vw, 5rem);
            background: linear-gradient(135deg, #fff, var(--primary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }

        /* --- SHOP SECTION --- */
        .shop-container { padding: 50px 10% 100px; }
        .section-header { text-align: center; margin-bottom: 50px; }
        
        .cooldown-info {
            font-family: 'Orbitron'; color: #777; font-size: 0.8rem;
            margin-top: 10px; text-transform: uppercase; letter-spacing: 2px;
        }
        #cooldown-timer { color: var(--secondary); font-weight: bold; }

        .grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
        }

        .item-card {
            background: var(--card-bg); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 25px; padding: 40px; text-align: center;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .item-card:hover {
            transform: translateY(-10px); border-color: var(--primary);
            background: rgba(0, 242, 255, 0.02);
        }

        .item-card img { width: 80px; margin-bottom: 20px; filter: drop-shadow(0 0 10px rgba(0,242,255,0.2)); }
        
        .btn {
            width: 100%; padding: 15px; border-radius: 12px;
            font-family: 'Orbitron'; font-weight: 700; cursor: pointer;
            transition: 0.3s; border: none; margin-top: 20px;
        }

        .btn-get { background: var(--primary); color: #000; }
        .btn-get:hover { box-shadow: 0 0 20px var(--primary); transform: scale(1.02); }
        .btn:disabled { background: #1a1a1a; color: #444; cursor: not-allowed; }

        /* --- MODAL --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(20px);
            display: none; justify-content: center; align-items: center; z-index: 2000;
        }

        .modal-card {
            background: #080808; border: 1px solid var(--primary);
            width: 90%; max-width: 450px; border-radius: 30px; padding: 40px;
        }

        input[type="text"] {
            width: 100%; background: #111; border: 1px solid #222;
            padding: 15px; border-radius: 10px; color: #fff; margin: 20px 0;
        }

        .player-preview {
            display: none; align-items: center; gap: 15px;
            background: #111; padding: 15px; border-radius: 12px; margin-bottom: 20px;
        }

        /* --- SLIDER --- */
        .slider-wrap { margin-top: 20px; }
        input[type="range"] { width: 100%; accent-color: var(--primary); margin-top: 10px; }

    </style>
</head>
<body>

    <div class="glow-mesh"></div>

    <nav class="navbar">
        <a href="#" class="logo">WOOF<span>SMP</span></a>
        <div class="uptime-pill">
            <i class="fa-solid fa-clock"></i>
            <span id="uptime-display">00:01:00</span>
        </div>
    </nav>

    <section class="hero">
        <h1>PREMIUM STORE</h1>
        <div class="cooldown-info">
            Next Delivery Available: <span id="cooldown-timer">NOW</span>
        </div>
    </section>

    <section class="shop-container">
        <div class="grid">
            <div class="item-card" id="card-iron">
                <img src="https://minecraft.wiki/images/Iron_Ingot_JE3_BE2.png">
                <h3>Iron Ingot</h3>
                <p style="opacity:0.5; font-size: 0.8rem;">LIMIT: 5</p>
                <button class="btn btn-get" onclick="openModal('iron')">Get</button>
            </div>
            <div class="item-card" id="card-gold">
                <img src="https://minecraft.wiki/images/Gold_Ingot_JE4_BE2.png">
                <h3>Gold Ingot</h3>
                <p style="opacity:0.5; font-size: 0.8rem;">LIMIT: 10</p>
                <button class="btn btn-get" onclick="openModal('gold')">Get</button>
            </div>
            <div class="item-card" id="card-apple">
                <img src="https://minecraft.wiki/images/Apple_JE3_BE3.png">
                <h3>Golden Apple</h3>
                <p style="opacity:0.5; font-size: 0.8rem;">LIMIT: 64</p>
                <button class="btn btn-get" onclick="openModal('apple')">Get</button>
            </div>
            <div class="item-card" id="card-diamond">
                <img src="https://minecraft.wiki/images/Diamond_JE3_BE3.png">
                <h3>Diamond</h3>
                <p style="opacity:0.5; font-size: 0.8rem;">LIMIT: 1</p>
                <button class="btn btn-get" onclick="openModal('diamond')">Get</button>
            </div>
        </div>
    </section>

    <div class="modal-overlay" id="purchase-modal">
        <div class="modal-card">
            <h2 id="m-title" style="font-family: Orbitron;">Verify Identity</h2>
            <input type="text" id="username" placeholder="Minecraft Username">
            <button class="btn btn-get" style="margin:0;" onclick="verifyMC()">Check Account</button>

            <div class="player-preview" id="preview">
                <img id="p-img" src="" style="width: 40px; border-radius: 5px;">
                <span id="p-user" style="font-weight: bold; color: var(--primary);"></span>
            </div>

            <div id="qty-box" style="display:none;" class="slider-wrap">
                <div style="display:flex; justify-content: space-between; font-family: Orbitron; font-size: 0.8rem;">
                    <span>Quantity</span>
                    <span id="qty-val" style="color:var(--primary)">1</span>
                </div>
                <input type="range" id="qty-slider" min="1" oninput="document.getElementById('qty-val').innerText=this.value">
                <button class="btn btn-get" style="margin-top:30px" onclick="confirmClaim()">Confirm Claim</button>
            </div>
            
            <button class="btn" style="background:transparent; color:#444;" onclick="closeModal()">Cancel</button>
        </div>
    </div>

    <script>
        const ITEMS = { iron: 5, gold: 10, apple: 64, diamond: 1 };
        let selected = '';
        
        // --- UPTIME ENGINE (Starts at 1min, never stops) ---
        let uptimeSeconds = 60; 
        function startUptime() {
            setInterval(() => {
                uptimeSeconds++;
                const h = Math.floor(uptimeSeconds / 3600).toString().padStart(2, '0');
                const m = Math.floor((uptimeSeconds % 3600) / 60).toString().padStart(2, '0');
                const s = Math.floor(uptimeSeconds % 60).toString().padStart(2, '0');
                document.getElementById('uptime-display').innerText = `${h}:${m}:${s}`;
            }, 1000);
        }

        // --- COOLDOWN LOGIC (Only starts after first get) ---
        function checkCooldown() {
            const lastClaim = localStorage.getItem('lastClaimTime');
            if(!lastClaim) {
                document.getElementById('cooldown-timer').innerText = "READY";
                return;
            }

            const diff = Date.now() - parseInt(lastClaim);
            const remaining = (24 * 60 * 60 * 1000) - diff;

            if(remaining <= 0) {
                localStorage.removeItem('lastClaimTime');
                localStorage.removeItem('claimedItems');
                location.reload();
            } else {
                const h = Math.floor(remaining / 3600000).toString().padStart(2, '0');
                const m = Math.floor((remaining % 3600000) / 60000).toString().padStart(2, '0');
                const s = Math.floor((remaining % 60000) / 1000).toString().padStart(2, '0');
                document.getElementById('cooldown-timer').innerText = `${h}:${m}:${s}`;
                
                // Disable all buttons if in cooldown
                document.querySelectorAll('.btn-get').forEach(b => {
                    b.disabled = true;
                    b.innerText = "LOCKED";
                });
            }
        }

        function openModal(id) {
            selected = id;
            document.getElementById('qty-slider').max = ITEMS[id];
            document.getElementById('purchase-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('purchase-modal').style.display = 'none';
        }

        async function verifyMC() {
            const user = document.getElementById('username').value;
            try {
                const res = await fetch(`https://api.ashcon.app/mojang/v2/user/${user}`);
                const data = await res.json();
                document.getElementById('p-img').src = `https://mc-heads.net/avatar/${data.uuid}`;
                document.getElementById('p-user').innerText = data.username;
                document.getElementById('preview').style.display = 'flex';
                document.getElementById('qty-box').style.display = 'block';
            } catch { alert("User not found!"); }
        }

        function confirmClaim() {
            // Start the 24 hour timer ONLY now
            localStorage.setItem('lastClaimTime', Date.now());
            alert("Claim Successful! Your items are being delivered.");
            closeModal();
            checkCooldown();
        }

        // Init
        startUptime();
        setInterval(checkCooldown, 1000);
        checkCooldown();
    </script>
</body>
</html>
